<svg xmlns="http://www.w3.org/2000/svg" width="700" height="1400" viewBox="0 0 700 1400" font-family="Arial, sans-serif">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-loop" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="700" height="1400" fill="#f9f9f9"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- START pill                                 -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="250" y="24" width="200" height="44" rx="22" fill="#dde8f0" stroke="#5a86a8" stroke-width="1.2"/>
  <text x="350" y="51" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a3a54">Start</text>

  <!-- arrow -->
  <line x1="350" y1="68" x2="350" y2="96" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- INIT block                                 -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="80" y="96" width="540" height="88" rx="8" fill="#e8f0fb" stroke="#5a7fbf" stroke-width="1.2"/>
  <text x="350" y="118" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a3060">Initialize</text>
  <text x="350" y="138" text-anchor="middle" font-size="12" fill="#2a4080">workerAvail[10] = 0</text>
  <text x="350" y="155" text-anchor="middle" font-size="12" fill="#2a4080">machineAvail[numMachines] = 0</text>
  <text x="350" y="172" text-anchor="middle" font-size="12" fill="#2a4080">totalWait = 0,  itemCount = 0</text>

  <!-- arrow -->
  <line x1="350" y1="184" x2="350" y2="218" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- LOOP CONDITION diamond                     -->
  <!-- ══════════════════════════════════════════ -->
  <!-- diamond: centre (350, 262), half-w=155, half-h=44 -->
  <polygon points="350,218 505,262 350,306 195,262"
           fill="#fff8e8" stroke="#c8952a" stroke-width="1.2"/>
  <text x="350" y="257" text-anchor="middle" font-size="13" font-weight="bold" fill="#6b4a00">itemCount &lt; N ?</text>
  <text x="350" y="275" text-anchor="middle" font-size="11" fill="#8a6010">(e.g. N = 10 000)</text>

  <!-- YES arrow down -->
  <line x1="350" y1="306" x2="350" y2="338" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="358" y="326" font-size="11" fill="#2a7a2a" font-weight="bold">Yes</text>

  <!-- NO arrow right -->
  <line x1="505" y1="262" x2="588" y2="262" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="516" y="254" font-size="11" fill="#aa2222" font-weight="bold">No</text>

  <!-- "Go to output" small rounded box -->
  <rect x="588" y="240" width="90" height="44" rx="8" fill="#ede8f8" stroke="#7a5abf" stroke-width="1.2"/>
  <text x="633" y="259" text-anchor="middle" font-size="11" fill="#3a1a7a">Go to</text>
  <text x="633" y="273" text-anchor="middle" font-size="11" fill="#3a1a7a">output</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- STEP 1: Select worker                      -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="80" y="338" width="540" height="60" rx="8" fill="#f0ebff" stroke="#7a5abf" stroke-width="1.2"/>
  <text x="350" y="361" text-anchor="middle" font-size="13" font-weight="bold" fill="#3a1a7a">Select worker  w = argmin(workerAvail)</text>
  <text x="350" y="381" text-anchor="middle" font-size="12" fill="#4a2a90">workerStart = workerAvail[w]</text>

  <line x1="350" y1="398" x2="350" y2="430" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- STEP 2: Generate assemblyTime              -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="80" y="430" width="540" height="60" rx="8" fill="#e4f7ef" stroke="#2a8a60" stroke-width="1.2"/>
  <text x="350" y="453" text-anchor="middle" font-size="13" font-weight="bold" fill="#0a4a30">Generate assemblyTime</text>
  <text x="350" y="473" text-anchor="middle" font-size="12" fill="#1a6040">assemblyTime ~ Uniform(100, 300)</text>

  <line x1="350" y1="490" x2="350" y2="522" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- STEP 3: Generate polishTime (reject loop)  -->
  <!-- ══════════════════════════════════════════ -->
  <!-- dashed container -->
  <rect x="70" y="522" width="560" height="108" rx="8" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="84" y="540" font-size="10" fill="#666">repeat until polishTime &#x2265; 5</text>

  <rect x="90" y="546" width="520" height="60" rx="8" fill="#e4f7ef" stroke="#2a8a60" stroke-width="1.2"/>
  <text x="350" y="569" text-anchor="middle" font-size="13" font-weight="bold" fill="#0a4a30">Generate polishTime</text>
  <text x="350" y="589" text-anchor="middle" font-size="12" fill="#1a6040">polishTime ~ Normal(&#x3bc;=20, &#x3c3;=7);  discard if &lt; 5</text>

  <line x1="350" y1="630" x2="350" y2="662" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- STEP 4: Compute assemblyDone               -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="80" y="662" width="540" height="60" rx="8" fill="#e4f7ef" stroke="#2a8a60" stroke-width="1.2"/>
  <text x="350" y="685" text-anchor="middle" font-size="13" font-weight="bold" fill="#0a4a30">Compute assemblyDone</text>
  <text x="350" y="705" text-anchor="middle" font-size="12" fill="#1a6040">assemblyDone = workerStart + assemblyTime</text>

  <line x1="350" y1="722" x2="350" y2="754" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- STEP 5: Select machine k                   -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="80" y="754" width="540" height="60" rx="8" fill="#f0ebff" stroke="#7a5abf" stroke-width="1.2"/>
  <text x="350" y="777" text-anchor="middle" font-size="13" font-weight="bold" fill="#3a1a7a">Select machine  k = argmin(machineAvail)</text>
  <text x="350" y="797" text-anchor="middle" font-size="12" fill="#4a2a90">Earliest available polishing machine</text>

  <line x1="350" y1="814" x2="350" y2="846" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- STEP 6: Compute machineStart               -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="80" y="846" width="540" height="60" rx="8" fill="#e4f7ef" stroke="#2a8a60" stroke-width="1.2"/>
  <text x="350" y="869" text-anchor="middle" font-size="13" font-weight="bold" fill="#0a4a30">Compute machineStart</text>
  <text x="350" y="889" text-anchor="middle" font-size="12" fill="#1a6040">machineStart = max(assemblyDone, machineAvail[k])</text>

  <line x1="350" y1="906" x2="350" y2="938" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- STEP 7: Compute waitTime                   -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="80" y="938" width="540" height="60" rx="8" fill="#fdecea" stroke="#bf4a3a" stroke-width="1.2"/>
  <text x="350" y="961" text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1a10">Compute waitTime</text>
  <text x="350" y="981" text-anchor="middle" font-size="12" fill="#8a2a20">waitTime = machineStart &#x2212; assemblyDone</text>

  <line x1="350" y1="998" x2="350" y2="1030" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- STEP 8: Update statistics                  -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="80" y="1030" width="540" height="60" rx="8" fill="#f0ebff" stroke="#7a5abf" stroke-width="1.2"/>
  <text x="350" y="1053" text-anchor="middle" font-size="13" font-weight="bold" fill="#3a1a7a">Update statistics</text>
  <text x="350" y="1073" text-anchor="middle" font-size="12" fill="#4a2a90">totalWait += waitTime;   itemCount++</text>

  <line x1="350" y1="1090" x2="350" y2="1122" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- STEP 9: Update machineAvail[k]             -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="80" y="1122" width="540" height="60" rx="8" fill="#e8f0fb" stroke="#5a7fbf" stroke-width="1.2"/>
  <text x="350" y="1145" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a3060">Update machine availability</text>
  <text x="350" y="1165" text-anchor="middle" font-size="12" fill="#2a4080">machineAvail[k] = machineStart + polishTime</text>

  <line x1="350" y1="1182" x2="350" y2="1214" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- STEP 10: Update workerAvail[w]             -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="80" y="1214" width="540" height="60" rx="8" fill="#e8f0fb" stroke="#5a7fbf" stroke-width="1.2"/>
  <text x="350" y="1237" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a3060">Update worker availability</text>
  <text x="350" y="1257" text-anchor="middle" font-size="12" fill="#2a4080">workerAvail[w] = machineAvail[k]</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- LOOP-BACK arrow (right side)               -->
  <!-- ══════════════════════════════════════════ -->
  <!-- right edge of step-10 box: x=620, y=1244  -->
  <!-- right side of diamond: x=505, y=262        -->
  <path d="M620 1244 L660 1244 L660 262 L505 262"
        fill="none" stroke="#888" stroke-width="1.2"
        stroke-dasharray="6 3" marker-end="url(#arrow-loop)"/>
  <!-- label alongside the vertical segment -->
  <text x="664" y="760" text-anchor="start" font-size="11" fill="#666"
        transform="rotate(-90 664 760)">next item (loop)</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- OUTPUT path from "Go to output" box        -->
  <!-- box right edge: x=678, y=262              -->
  <!-- route: down the right at x=678 to y=1320, then left -->
  <!-- ══════════════════════════════════════════ -->
  <path d="M633 284 L633 1310 L480 1310"
        fill="none" stroke="#888" stroke-width="1.2"
        stroke-dasharray="6 3" marker-end="url(#arrow-loop)"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- OUTPUT: avgWait computation                -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="80" y="1288" width="400" height="44" rx="8" fill="#e8f0fb" stroke="#5a7fbf" stroke-width="1.2"/>
  <text x="280" y="1315" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a3060">avgWait = totalWait / itemCount</text>

  <line x1="280" y1="1332" x2="280" y2="1360" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- END pill                                   -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="170" y="1360" width="220" height="44" rx="22" fill="#dde8f0" stroke="#5a86a8" stroke-width="1.2"/>
  <text x="280" y="1387" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a3a54">Output avgWait. End.</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- LEGEND                                     -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="14" y="24" width="58" height="160" rx="8" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="43" y="42" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Key</text>

  <rect x="20" y="52" width="12" height="12" rx="3" fill="#e8f0fb" stroke="#5a7fbf" stroke-width="1"/>
  <text x="36" y="63" font-size="10" fill="#333">Init/Update</text>

  <rect x="20" y="74" width="12" height="12" rx="3" fill="#e4f7ef" stroke="#2a8a60" stroke-width="1"/>
  <text x="36" y="85" font-size="10" fill="#333">Compute</text>

  <rect x="20" y="96" width="12" height="12" rx="3" fill="#f0ebff" stroke="#7a5abf" stroke-width="1"/>
  <text x="36" y="107" font-size="10" fill="#333">Select/Stats</text>

  <rect x="20" y="118" width="12" height="12" rx="3" fill="#fdecea" stroke="#bf4a3a" stroke-width="1"/>
  <text x="36" y="129" font-size="10" fill="#333">Wait time</text>

  <rect x="20" y="140" width="12" height="12" rx="3" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="36" y="151" font-size="10" fill="#333">Reject loop</text>

  <rect x="20" y="162" width="12" height="12" rx="3" fill="#fff8e8" stroke="#c8952a" stroke-width="1"/>
  <text x="36" y="173" font-size="10" fill="#333">Decision</text>

</svg>
